name: Setup
description: Checkout, install Node, and install dependencies

inputs:
  registry-url:
    description: npm registry URL (only needed for publish)
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: npm
        registry-url: ${{ inputs.registry-url }}

    - name: Install dependencies
      run: npm ci
      shell: bash
